<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>報價系統 | 模式選擇</title>
    <style>
        :root {
            --text-main: #1e293b;
            --text-sub: #64748b;
            --border-color: #e2e8f0;
            --hover-bg: #f8fafc;
        }

        body {
            font-family: "Inter", "PingFang TC", "Microsoft JhengHei", sans-serif;
            background-color: #ffffff;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: var(--text-main);
        }

        .portal-wrapper {
            width: 100%;
            max-width: 500px;
            padding: 40px 20px;
        }

        header {
            text-align: left;
            margin-bottom: 40px;
            border-left: 4px solid var(--text-main);
            padding-left: 20px;
        }

        h1 { font-size: 22px; font-weight: 800; margin: 0; letter-spacing: 1px; }
        .subtitle { font-size: 14px; color: var(--text-sub); margin-top: 5px; }

        .list-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .list-item {
            text-decoration: none;
            padding: 20px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            transition: all 0.2s ease;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .list-item:hover {
            background-color: var(--hover-bg);
            border-color: var(--text-main);
            transform: translateX(5px);
        }

        .item-info {
            display: flex;
            flex-direction: column;
        }

        .item-title {
            font-size: 16px;
            font-weight: 700;
            color: var(--text-main);
        }

        .item-desc {
            font-size: 12px;
            color: var(--text-sub);
            margin-top: 4px;
        }

        .arrow {
            font-size: 18px;
            color: var(--border-color);
            transition: color 0.2s;
        }

        .list-item:hover .arrow {
            color: var(--text-main);
        }

        footer {
            margin-top: 50px;
            font-size: 11px;
            color: #cbd5e1;
            text-align: left;
            letter-spacing: 1px;
        }

        @media (max-width: 480px) {
            .portal-wrapper { padding: 20px; }
        }
    </style>
</head>
<body>

<div class="portal-wrapper">
    <header>
        <h1>報價系統版本選擇</h1>
        <div class="subtitle">QUOTATION SYSTEM SELECTION</div>
    </header>

    <div class="list-container">
        <a href="./vibrant/" class="list-item">
            <div class="item-info">
                <span class="item-title">活力版 VIBRANT</span>
                <span class="item-desc">適用於新創企業、品牌活動與創意專案</span>
            </div>
            <div class="arrow">→</div>
        </a>

        <a href="./fresh/" class="list-item">
            <div class="item-info">
                <span class="item-title">清新版 FRESH</span>
                <span class="item-desc">適用於個人工作室、設計服務與顧問業務</span>
            </div>
            <div class="arrow">→</div>
        </a>

        <a href="./simple/" class="list-item">
            <div class="item-info">
                <span class="item-title">簡約版 SIMPLE</span>
                <span class="item-desc">適用於正式商務合約、工程開發與標準報價</span>
            </div>
            <div class="arrow">→</div>
        </a>

                <a href="./plan/" class="list-item">
            <div class="item-info">
                <span class="item-title">分期版 PLAN</span>
                <span class="item-desc">適用於需要自動計算分期付款的報價</span>
            </div>
            <div class="arrow">→</div>
        </a>
        
                <a href="./color/" class="list-item">
            <div class="item-info">
                <span class="item-title">自由定義色彩COLOR</span>
                <span class="item-desc">適用於有強烈的公司特色,想創造個人化的報價單</span>
            </div>
            <div class="arrow">→</div>
        </a>
    </div>

    <footer>
        EST. 2026 / DOCUMENT MANAGEMENT SYSTEM
    </footer>
</div>

</body>
</html>
