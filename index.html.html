<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>清新商務報價系統 - 活力版</title>
    <style>
        /* 清新莫蘭迪配色中心 - 高明度、低彩度 */
        :root { 
            --primary: #55b6a7;       /* 清新薄荷綠 (溫和的主色) */
            --accent: #f8a356;        /* 活力亮橘 (點綴色) */
            --bg-page: #f0faf9;       /* 極淺綠背景 (讓頁面看起來更清爽) */
            --text-main: #27272a;     /* 深色字 (維持閱讀清晰) */
            --text-light: #71717a;    /* 輔助字 */
            --border: #e4e4e7;        /* 線條色 */
        }
        
        * { box-sizing: border-box; font-family: "Quicksand", "PingFang TC", "Microsoft JhengHei", sans-serif; }
        
        /* 網頁背景改為柔和的深灰色，突顯 A4 紙張 */
        body { background: #3f3f46; padding: 20px; display: flex; justify-content: center; color: var(--text-main); }

        .a4-page { 
            background: white; width: 210mm; min-height: 297mm; 
            padding: 25px 60px 40px; /* 頂部 padding 保持精簡，匯出 PDF 不留白 */
            box-shadow: 0 15px 35px rgba(0,0,0,0.2); 
            position: relative; display: flex; flex-direction: column;
            border-radius: 8px; /* 增加一點點圓角感 */
        }

        /* Header 緊湊且有設計感 */
        .header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 25px; }
        .brand-container { display: flex; gap: 15px; align-items: center; }
        
        .logo-box {
            width: 75px; height: 75px; border: 2px dashed var(--primary); /* 薄荷綠虛線框 */
            display: flex; align-items: center; justify-content: center;
            position: relative; overflow: hidden; background: #fafafa;
            border-radius: 12px;
        }
        .logo-box img { max-width: 85%; max-height: 85%; object-fit: contain; }
        .logo-placeholder { font-size: 10px; color: var(--primary); text-align: center; cursor: pointer; font-weight: 700; }
        #logo-file { position: absolute; width: 100%; height: 100%; opacity: 0; cursor: pointer; }

        .brand-zone { border-left: 5px solid var(--accent); padding-left: 15px; } /* 亮橘色側邊線 */
        .company-name { font-size: 20px; font-weight: 900; border: none; outline: none; width: 300px; background: transparent; color: var(--primary); }
        .company-sub { font-size: 13px; color: var(--text-light); margin-top: 5px; line-height: 1.5; }
        
        /* 自由標籤 - 字體 14px */
        .label-editable { border: none; outline: none; background: transparent; font-weight: 700; color: var(--primary); width: 85px; font-size: 13px; }
        .value-editable { border: none; outline: none; background: transparent; color: var(--text-light); width: 200px; font-size: 13px; }

        .doc-meta { text-align: right; }
        .doc-label { font-size: 11px; font-weight: 800; color: var(--primary); letter-spacing: 2px; }
        .doc-no-input { border: none; outline: none; text-align: right; font-size: 16px; font-weight: 300; width: 180px; color: var(--text-light); }

        /* 專案名稱帶有清新背景 */
        .project-wrap { margin-bottom: 25px; background: var(--bg-page); padding: 12px 18px; border-radius: 8px; border: 1px solid #d1e9e6; }
        .tag { font-size: 12px; font-weight: 800; color: var(--accent); margin-bottom: 3px; display: block; }
        .project-input { border: none; font-size: 18px; font-weight: 800; width: 100%; outline: none; background: transparent; }

        .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; margin-bottom: 25px; }
        .info-row { display: grid; grid-template-columns: 85px 1fr; border-bottom: 1px solid #f1f5f9; padding: 7px 0; align-items: center; }
        .info-input { border: none; outline: none; font-size: 14px; text-align: left; font-weight: 600; background: transparent; width: 100%; }

        /* 表格：清新對比 */
        .table-main { width: 100%; border-collapse: collapse; margin-bottom: 18px; }
        .table-main th { text-align: center; padding: 10px; font-size: 13px; color: white; background: var(--primary); border: none; }
        .table-main th:first-child { border-radius: 6px 0 0 0; }
        .table-main th:last-child { border-radius: 0 6px 0 0; }
        .table-main td { padding: 10px; border-bottom: 1px solid var(--border); vertical-align: top; font-size: 14px; }

        .col-id { width: 40px; color: var(--primary); font-weight: 800; }
        .col-qty { width: 60px; text-align: center; } 
        .col-price { width: 110px; text-align: right; }
        .col-sum { width: 130px; text-align: right; font-weight: 700; }

        .field-input { border: none; outline: none; text-align: inherit; font-size: 14px; background: transparent; width: 100%; }
        .auto-expand { width: 100%; border: none; outline: none; resize: none; font-size: 14px; line-height: 1.0; background: transparent; overflow: hidden; }

        /* TOTAL 精緻化 */
        .footer-layout { display: flex; flex-direction: column; gap: 20px; }
        .summary-box { align-self: flex-end; width: 150px; text-align: right; padding-right: 10px; }
        .sum-row.grand { border-top: 3px solid var(--accent); padding-top: 10px; display: flex; flex-direction: column; align-items: flex-end; }
        .grand-label { font-size: 12px; font-weight: 900; color: var(--accent); }
        .grand-price { font-size: 20px; font-weight: 900; color: var(--primary); }

        /* 清新卡片風格 */
        .card { background: #fafafa; border-radius: 10px; padding: 18px; border: 1px solid var(--border); }
        .card-title { font-size: 13px; font-weight: 800; color: var(--primary); margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
        .card-title::before { content: ""; width: 4px; height: 14px; background: var(--accent); border-radius: 2px; }
        
        .pay-amt-input { width: 130px; text-align: right; color: var(--text-main); font-weight: 700; border: none; font-size: 14px; background: transparent; }

        .signature-zone { margin-top: 30px; align-self: flex-end; text-align: center; }
        .signature-line { width: 180px; border-bottom: 2px solid var(--primary); margin-bottom: 6px; height: 40px; }
        .signature-label { font-size: 12px; font-weight: 800; color: var(--text-light); }

        /* 工具列活潑按鈕 */
        .toolbar { position: fixed; left: 20px; top: 20px; display: flex; flex-direction: column; gap: 10px; z-index: 100; }
        button { border: none; border-radius: 50px; padding: 10px 20px; font-weight: 800; cursor: pointer; color: white; font-size: 12px; transition: 0.2s; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .btn-dark { background: #3f3f46; }
        .btn-blue { background: var(--primary); }
        .btn-del { background: #fee2e2; color: #ef4444; padding: 4px 8px; font-size: 12px; box-shadow: none; border-radius: 6px; }
        .btn-warn { background: var(--accent); margin-top: 20px; }
        button:hover { transform: translateY(-2px); box-shadow: 0 6px 15px rgba(0,0,0,0.15); }

        @media print {
            .toolbar, .btn-del { display: none !important; }
            body { background: white; padding: 0; }
            .a4-page { box-shadow: none; width: 100%; margin: 0; padding: 5px 30px; }
            .pay-pct-input { background: transparent !important; }
        }
    </style>
</head>
<body oninput="saveAllData()">

<div class="toolbar">
    <button class="btn-blue" onclick="addRow()">＋ 新增服務項目</button>
    <button class="btn-dark" onclick="addPayRow()">＋ 新增付款期數</button>
    <button class="btn-blue" style="background: #10b981;" onclick="window.print()">🖨️ 列印 / 存為 PDF</button>
    <button class="btn-warn" onclick="clearData()">🧹 重置數據</button>
</div>

<div class="a4-page">
    <div class="header">
        <div class="brand-container">
            <div class="logo-box">
                <img id="logo-preview" src="" style="display:none;">
                <div class="logo-placeholder" id="logo-text">點擊上傳<br>LOGO</div>
                <input type="file" id="logo-file" accept="image/*" onchange="handleLogo(this)">
            </div>
            <div class="brand-zone">
                <input type="text" class="company-name save-field" id="my_co_name" value="您的清新工作室">
                <div class="company-sub">
                    <div><input type="text" class="save-field label-editable" id="L1" value="統一編號："><input type="text" class="save-field value-editable" id="V1" value="88888888"></div>
                    <div><input type="text" class="save-field label-editable" id="L2" value="官方網站："><input type="text" class="save-field value-editable" id="V2" value="www.studio.com"></div>
                    <div><input type="text" class="save-field label-editable" id="L3" value="聯絡電話："><input type="text" class="save-field value-editable" id="V3" value="0900-000-000"></div>
                </div>
            </div>
        </div>
        <div class="doc-meta">
            <div class="doc-label">QUOTATION</div>
            <input type="text" class="doc-no-input save-field" id="doc_no" placeholder="QTN-20240101">
        </div>
    </div>

    <div class="project-wrap">
        <span class="tag">專案名稱 PROJECT NAME</span>
        <input type="text" class="project-input save-field" id="proj_name" placeholder="請輸入令人期待的專案標題">
    </div>

    <div class="info-grid">
        <div class="info-col">
            <div class="info-row">
                <input type="text" id="cust_L1" class="label-editable save-field" value="客戶抬頭">
                <input type="text" id="cust_V1" class="info-input save-field" placeholder="請輸入合作夥伴全銜...">
            </div>
            <div class="info-row">
                <input type="text" id="cust_L2" class="label-editable save-field" value="統一編號">
                <input type="text" id="cust_V2" class="info-input save-field">
            </div>
            <div class="info-row">
                <input type="text" id="cust_L3" class="label-editable save-field" value="聯絡窗口">
                <input type="text" id="cust_V3" class="info-input save-field">
            </div>
        </div>
        <div class="info-col">
            <div class="info-row">
                <input type="text" id="cust_L4" class="label-editable save-field" value="報價日期">
                <input type="date" id="doc_date" class="info-input save-field">
            </div>
            <div class="info-row">
                <input type="text" id="cust_L5" class="label-editable save-field" value="有效期限">
                <input type="text" id="doc_valid" class="info-input save-field" value="30 天">
            </div>
            <div class="info-row">
                <input type="text" id="cust_L6" class="label-editable save-field" value="聯繫電話">
                <input type="text" id="cust_V4" class="info-input save-field">
            </div>
        </div>
    </div>

    <table class="table-main">
        <thead>
            <tr>
                <th class="col-id">#</th>
                <th class="col-desc">服務項目描述 Description</th>
                <th class="col-qty">數量</th>
                <th class="col-price">單價</th>
                <th class="col-sum">小計</th>
                <th style="width: 20px;" class="toolbar"></th>
            </tr>
        </thead>
        <tbody id="itemBody"></tbody>
    </table>

    <div class="footer-layout">
        <div class="summary-box">
            <div class="sum-row grand">
                <span class="grand-label">TOTAL</span>
                <span class="grand-price" id="res-grand">$ 0</span>
            </div>
        </div>

        <div class="card">
            <div class="card-title">付款時程建議</div>
            <table style="width: 100%; border-collapse: collapse;">
                <tbody id="payBody"></tbody>
            </table>
        </div>

        <div class="card">
            <div class="card-title">備註事項</div>
            <textarea id="memo" class="auto-expand save-field" oninput="resize(this)">1. 本報價內容為服務費用，未稅。
2. 期待與您展開令人興奮的合作！</textarea>
        </div>

        <div class="card">
            <div class="card-title">匯款帳戶</div>
            <textarea id="bankInfo" class="auto-expand save-field" oninput="resize(this)">銀行代碼：(000) 創意銀行
戶名：您的公司名稱
帳號：1234-567-890123</textarea>
        </div>

        <div class="signature-zone">
            <div class="signature-line"></div>
            <div class="signature-label">客戶簽章 Authorized Signature</div>
        </div>
    </div>
</div>

<script>
    // 邏輯部分保持與之前一致，確保所有數據能正常計算與儲存。
    window.onload = function() {
        if (!loadAllData()) {
            addRow();
            addPayRow("第一期：訂金 (50%)", "0");
            document.getElementById('doc_date').valueAsDate = new Date();
            generateDocNo(); 
        }
        setTimeout(() => { document.querySelectorAll('textarea').forEach(el => resize(el)); }, 100);
        calc();
    }

    function generateDocNo() {
        const now = new Date();
        const yyyy = now.getFullYear();
        const mm = String(now.getMonth() + 1).padStart(2, '0');
        const dd = String(now.getDate()).padStart(2, '0');
        document.getElementById('doc_no').value = `QTN-${yyyy}${mm}${dd}-01`;
    }

    function handleLogo(input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = function(e) {
                const preview = document.getElementById('logo-preview');
                preview.src = e.target.result;
                preview.style.display = 'block';
                document.getElementById('logo-text').style.display = 'none';
                saveAllData();
            }
            reader.readAsDataURL(input.files[0]);
        }
    }

    function formatNum(n) { return Number(n).toLocaleString('en-US'); }
    function toMoney(el) { 
        let val = el.value.replace(/,/g, ''); 
        if(!isNaN(val) && val !== "") el.value = formatNum(val); 
        saveAllData();
    }
    function toNum(el) { el.value = el.value.replace(/,/g, ''); }
    function resize(el) { el.style.height = 'auto'; el.style.height = el.scrollHeight + 'px'; }

    function addRow(desc = "", qty = 1, price = 0) {
        const tbody = document.getElementById('itemBody');
        const num = (tbody.rows.length + 1).toString().padStart(2, '0');
        const row = `<tr>
            <td class="col-id">${num}</td>
            <td class="col-desc"><textarea class="auto-expand item-desc" rows="1" oninput="resize(this);saveAllData()">${desc}</textarea></td>
            <td class="col-qty"><input type="number" class="field-input qty-input" value="${qty}" oninput="calc();saveAllData()"></td>
            <td class="col-price"><input type="text" class="field-input" value="${formatNum(price)}" onfocus="toNum(this)" onblur="toMoney(this)" oninput="calc()"></td>
            <td class="col-sum sub-val">${formatNum(qty * price)}</td>
            <td class="toolbar"><button class="btn-del" onclick="this.closest('tr').remove();calc();saveAllData();">✕</button></td>
        </tr>`;
        tbody.insertAdjacentHTML('beforeend', row);
        resize(tbody.lastElementChild.querySelector('textarea'));
    }

    function addPayRow(desc = "", amt = "0") {
        const row = `<tr>
            <td><input type="text" class="field-input pay-desc" value="${desc}" oninput="saveAllData()"></td>
            <td style="text-align: right;">
                <span style="font-size: 12px; color: var(--text-light);">$</span>
                <input type="text" class="pay-amt-input" value="${amt}" onfocus="toNum(this)" onblur="toMoney(this)" oninput="saveAllData()">
            </td>
            <td class="toolbar" style="text-align: right; width: 30px;"><button class="btn-del" onclick="this.closest('tr').remove();saveAllData();">✕</button></td>
        </tr>`;
        document.getElementById('payBody').insertAdjacentHTML('beforeend', row);
    }

    function calc() {
        let total = 0;
        document.querySelectorAll('#itemBody tr').forEach((row, i) => {
            row.cells[0].innerText = (i + 1).toString().padStart(2, '0');
            const q = row.querySelector('.qty-input').value || 0;
            const p = row.querySelector('input[onblur="toMoney(this)"]').value.replace(/,/g, '') || 0;
            const sub = q * p;
            row.querySelector('.sub-val').innerText = formatNum(sub);
            total += sub;
        });
        document.getElementById('res-grand').innerText = '$ ' + formatNum(total);
    }

    function saveAllData() {
        const data = { fields: {}, items: [], payments: [], logo: "" };
        document.querySelectorAll('.save-field').forEach(el => data.fields[el.id] = el.value);
        document.querySelectorAll('#itemBody tr').forEach(row => {
            data.items.push({ desc: row.querySelector('.item-desc').value, qty: row.querySelector('.qty-input').value, price: row.querySelector('input[onblur="toMoney(this)"]').value.replace(/,/g, '') });
        });
        document.querySelectorAll('#payBody tr').forEach(row => {
            data.payments.push({ desc: row.querySelector('.pay-desc').value, amt: row.querySelector('.pay-amt-input').value });
        });
        data.logo = document.getElementById('logo-preview').src;
        localStorage.setItem('quotationData_vMint', JSON.stringify(data));
    }

    function loadAllData() {
        const saved = localStorage.getItem('quotationData_vMint');
        if (!saved) return false;
        const data = JSON.parse(saved);
        for (let id in data.fields) { const el = document.getElementById(id); if (el) el.value = data.fields[id]; }
        if (data.logo && data.logo.startsWith('data:image')) {
            const preview = document.getElementById('logo-preview');
            preview.src = data.logo;
            preview.style.display = 'block';
            document.getElementById('logo-text').style.display = 'none';
        }
        document.getElementById('itemBody').innerHTML = '';
        data.items.forEach(item => addRow(item.desc, item.qty, item.price));
        document.getElementById('payBody').innerHTML = '';
        data.payments.forEach(pay => addPayRow(pay.desc, pay.amt));
        return true;
    }

    function clearData() {
        if (confirm("確定要清空嗎？所有創意都會被重置喔！")) {
            localStorage.removeItem('quotationData_vMint');
            location.reload();
        }
    }
</script>

</body>
</html>
