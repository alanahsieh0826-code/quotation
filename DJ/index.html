<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>專業商務報價系統 v22 - 付款資訊優化版</title>
    <style>
        :root { --slate-900: #0f172a; --slate-700: #334155; --slate-500: #64748b; --slate-200: #e2e8f0; --blue-600: #2563eb; }
        * { box-sizing: border-box; font-family: "Inter", "PingFang TC", "Microsoft JhengHei", sans-serif; }
        body { background: #475569; padding: 20px; display: flex; justify-content: center; color: var(--slate-900); }

        .a4-page { 
            background: white; width: 210mm; min-height: 297mm; padding: 30px 60px; 
            box-shadow: 0 40px 100px -20px rgba(0,0,0,0.5); position: relative; display: flex; flex-direction: column;
        }

        .header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 25px; }
        .brand-zone { border-left: 3.5px solid var(--blue-600); padding-left: 12px; }
        .company-name-row { display: flex; align-items: center; gap: 4px; }
        .company-stamp { width: 75px; height: 75px; object-fit: contain; mix-blend-mode: multiply; }
        body.hide-stamp .company-stamp { display: none !important; }
        .company-name { font-size: 18px; font-weight: 800; border: none; outline: none; width: 200px; background: transparent; flex: 0 0 auto; }
        .company-sub { font-size: 14px; color: var(--slate-500); margin-top: 5px; line-height: 1.5; }
        .company-sub input { border: none; outline: none; font-size: 14px; width: 250px; color: var(--slate-500); background: transparent; }

        .doc-meta { text-align: right; }
        .doc-label { font-size: 12px; font-weight: 800; color: var(--blue-600); letter-spacing: 2px; }
        .doc-no-input { border: none; outline: none; text-align: right; font-size: 18px; font-weight: 300; width: 200px; background: transparent; }

        .project-wrap { margin-bottom: 25px; }
        .tag { font-size: 14px; font-weight: 800; color: var(--slate-500); text-transform: uppercase; margin-bottom: 4px; display: block; }
        .project-input { border: none; font-size: 16px; font-weight: 700; width: 100%; outline: none; border-bottom: 1.5px solid var(--slate-200); padding-bottom: 4px; }

        .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 50px; margin-bottom: 25px; }
        .info-row { display: grid; grid-template-columns: 80px 1fr; border-bottom: 1px solid #f1f5f9; padding: 5px 0; align-items: center; }
        .info-label { font-size: 14px; font-weight: 700; color: var(--slate-500); }
        .info-input { border: none; outline: none; font-size: 14px; text-align: left; font-weight: 600; background: transparent; }

        .table-main { width: 100%; border-collapse: collapse; margin-bottom: 20px; }
        .table-main th { text-align: left; padding: 10px; font-size: 14px; color: var(--slate-500); border-bottom: 2px solid var(--slate-900); letter-spacing: 1px; white-space: nowrap; }
        .table-main td { padding: 8px 10px; border-bottom: 1px solid var(--slate-200); vertical-align: top; }

        .col-id { width: 30px; font-size: 14px; color: var(--slate-500); font-weight: 800; padding-top: 12px !important; }
        .col-desc { width: 55%; }
        .col-qty { width: 110px; text-align: center; padding-left: 4px !important; padding-right: 4px !important; }
        .qty-header-input { width: 100%; border: none; outline: none; background: transparent; text-align: center; font-size: 14px; color: var(--slate-500); font-weight: 700; letter-spacing: 1px; font-family: inherit; }
        .qty-input::-webkit-inner-spin-button, .qty-input::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        .qty-input { -moz-appearance: textfield; }
        .col-price { width: 110px; text-align: center; }
        .col-sum { width: 110px; text-align: center; }
        .table-main th.col-qty, .table-main th.col-price, .table-main th.col-sum { text-align: center; }

        .field-amount, .sub-val, .qty-input { font-size: 14px !important; font-weight: 600; color: var(--slate-900); align-items: center;}
        .qty-input { text-align: center; }

        .auto-expand { 
            width: 100%; border: none; outline: none; resize: none; 
            font-size: 14px; line-height: 1.5; color: var(--slate-900); 
            background: transparent; overflow: hidden; min-height: 1.4em;
        }

        .field-input { width: 100%; border: none; outline: none; text-align: inherit; font-size: inherit; font-weight: inherit; background: transparent; }

        .footer-layout { display: flex; flex-direction: column; gap: 12px; }
        .summary-box { align-self: flex-end; width: 250px; }
        .sum-row { display: flex; justify-content: space-between; padding: 2px 0; font-size: 14px; color: var(--slate-500); }
        .sum-row.grand { border-top: 2px solid var(--slate-900); margin-top: 5px; padding-top: 8px; color: var(--slate-900); font-size: 18px; font-weight: 900; }

        .card { background: #fdfdfd; border-radius: 6px; padding: 12px 15px; border: 1px solid var(--slate-200); }
        .card-title { font-size: 14px; font-weight: 800; color: var(--slate-900); margin-bottom: 6px; display: flex; align-items: center; gap: 6px; }
        .card-title::before { content: ""; width: 3px; height: 10px; background: var(--blue-600); }

        .pay-desc { font-weight: normal; font-size: 14px; }
        .pay-pct-input { width: 60px; text-align: center; color: var(--blue-600); font-weight: 800; font-size: 14px; background: #eff6ff; border-radius: 4px; } 

        .edit-area { 
            width: 100%; border: none; background: transparent; font-size: 14px; 
            color: var(--slate-700); outline: none; line-height: 1.5; 
            resize: none; overflow: hidden; min-height: 2em; white-space: pre-wrap;
        }

        /* 列印用鏡像 div，平常隱藏 */
        .print-mirror { display: none; white-space: pre-wrap; font-size: 14px; line-height: 1.5; color: var(--slate-700); }

        /* 特別針對付款資訊區塊加大空間 */
        #bankInfo {
            min-height: 5em; /* 足夠顯示至少 3 行，並保留一點呼吸空間 */
            line-height: 1.6;
            padding-top: 5px;
        }

        .signature-zone { margin-top: 15px; align-self: flex-end; text-align: center; }
        .signature-line { width: 160px; border-bottom: 1.5px solid var(--slate-900); margin-bottom: 5px; height: 30px; }

        .toolbar { position: fixed; left: 20px; top: 20px; display: flex; flex-direction: column; gap: 8px; z-index: 100; }
        button { border: none; border-radius: 4px; padding: 8px 14px; font-weight: 700; cursor: pointer; color: white; font-size: 11px; }
        .btn-dark { background: var(--slate-900); }
        .btn-blue { background: var(--blue-600); }
        .btn-del { background: #fee2e2; color: #ef4444; padding: 2px 5px; font-size: 12px; box-shadow: none; }
        .btn-warn { background: #f59e0b; color: white; margin-top: 10px; }
        .btn-green { background: #059669; }
        .btn-gray { background: #64748b; }

        /* 方案模式：隱藏合計、稅額、付款條件 */
        body.proposal-mode .summary-box { display: none !important; }
        body.proposal-mode .pay-amt { visibility: hidden; }

        /* 方案模式：勾選框 */
        .pick-box { display: none; transform: scale(1.4); cursor: pointer; }
        body.proposal-mode .pick-box { display: inline-block; }
        body.proposal-mode .row-tool .btn-del { display: none; }

        /* 隱藏付款資訊 */
        body.hide-bank .bank-card { display: none !important; }

        /* 名單管理彈窗 */
        .modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 200; display: none; align-items: center; justify-content: center; }
        .modal-bg.show { display: flex; }
        .modal { background: white; border-radius: 8px; padding: 20px; width: 480px; max-height: 80vh; overflow-y: auto; }
        .modal h3 { margin: 0 0 12px; font-size: 16px; }
        .modal table { width: 100%; border-collapse: collapse; font-size: 13px; }
        .modal th, .modal td { padding: 6px; border-bottom: 1px solid var(--slate-200); text-align: left; }
        .modal input { width: 100%; border: 1px solid var(--slate-200); border-radius: 3px; padding: 4px 6px; font-size: 13px; }
        .modal .btn-row { display: flex; gap: 8px; justify-content: flex-end; margin-top: 12px; }

        @media print {
            @page {
                margin: 12mm 12mm 18mm 12mm;
                @bottom-center {
                    content: "第 " counter(page) " / " counter(pages) " 頁";
                    font-size: 10px;
                    color: #64748b;
                }
            }
            .toolbar, .btn-del, .no-print { display: none !important; }
            body:not(.proposal-mode) .row-tool { display: none !important; }
            .quote-only-hide { display: none !important; }
            .edit-area { display: none !important; }
            .print-mirror { display: block !important; }
            body { background: white; padding: 0; }
            .a4-page { box-shadow: none; width: 100%; margin: 0; padding: 10px 40px; }
            .pay-pct-input { background: transparent !important; }
        }
    </style>
</head>
<body oninput="saveAllData()">

<div class="toolbar">
    <button class="btn-dark" onclick="addRow()">＋ 新增報價項目</button>
    <button class="btn-dark" style="background: #475569;" onclick="addPayRow()">＋ 新增付款期數</button>
    <button class="btn-green" onclick="openCustomerModal()">👥 客戶名單</button>

</div>

<script>
    // 初始化與載入
    window.onload = function() {
        if (!loadAllData()) {
            addRow();
            addPayRow("第一期：訂金 (30%)", 30);
            document.getElementById('doc_date').valueAsDate = new Date();
            document.getElementById('doc_no').value = nextDocNo();
        }
        document.querySelectorAll('textarea').forEach(el => resize(el));
        syncPrint('memo');
        syncPrint('bankInfo');
        calc();
    }

    function nextDocNo() {
        const d = new Date();
        const today = d.getFullYear() + String(d.getMonth()+1).padStart(2,'0') + String(d.getDate()).padStart(2,'0');
        const rec = JSON.parse(localStorage.getItem('docSeq') || '{}');
        const seq = (rec.date === today ? (rec.seq || 0) : 0) + 1;
        localStorage.setItem('docSeq', JSON.stringify({ date: today, seq: seq }));
        return 'QTN-' + today + String(seq).padStart(2,'0');
    }

    function formatNum(n) { return Number(n).toLocaleString('en-US'); }
    function toMoney(el) { 
        let val = el.value.replace(/,/g, ''); 
        if(!isNaN(val) && val !== "") el.value = formatNum(val); 
        saveAllData();
    }
    function toNum(el) { el.value = el.value.replace(/,/g, ''); }
    function resize(el) { el.style.height = 'auto'; el.style.height = el.scrollHeight + 'px'; }
    function syncPrint(id) {
        const src = document.getElementById(id);
        const dst = document.getElementById(id + '_print');
        if (src && dst) dst.textContent = src.value;
    }

    // 新增報價項目
    function addRow(desc = "", qty = 1, price = 0, picked = false) {
        const tbody = document.getElementById('itemBody');
        const num = (tbody.rows.length + 1).toString().padStart(2, '0');
        const row = `<tr>
            <td class="col-id">${num}</td>
            <td class="col-desc"><textarea class="auto-expand item-desc" rows="1" oninput="resize(this);saveAllData()">${desc}</textarea></td>
            <td class="col-qty"><input type="number" class="field-input qty-input" value="${qty}" oninput="calc();saveAllData()"></td>
            <td class="col-price"><input type="text" class="field-input field-amount price-format" value="${formatNum(price)}" onfocus="toNum(this)" onblur="toMoney(this)" oninput="calc()"></td>
            <td class="col-sum sub-val">0</td>
            <td class="row-tool" style="text-align:center;"><input type="checkbox" class="pick-box" ${picked ? 'checked' : ''} onchange="saveAllData()"><button class="btn-del" onclick="this.closest('tr').remove();calc();saveAllData();">✕</button></td>
        </tr>`;
        tbody.insertAdjacentHTML('beforeend', row);
        resize(tbody.lastElementChild.querySelector('textarea'));
    }

    // 新增付款期數
    function addPayRow(desc = "", pct = 0) {
        const row = `<tr>
            <td><input type="text" class="field-input pay-desc" value="${desc}" oninput="saveAllData()"></td>
            <td style="text-align: right; font-size: 12px;">比例 <input type="number" class="pay-pct field-input pay-pct-input" value="${pct}" oninput="calc();saveAllData()"> %</td>
            <td style="text-align: right; font-weight: 800; font-size: 14px;" class="pay-amt">0</td>
            <td class="row-tool" style="text-align: right;"><button class="btn-del" onclick="this.closest('tr').remove();calc();saveAllData();">✕</button></td>
        </tr>`;
        document.getElementById('payBody').insertAdjacentHTML('beforeend', row);
    }

    // 計算總額
    function calc() {
        let raw = 0;
        document.querySelectorAll('#itemBody tr').forEach((row, i) => {
            row.cells[0].innerText = (i + 1).toString().padStart(2, '0');
            const q = row.querySelector('.qty-input').value || 0;
            const p = row.querySelector('.price-format').value.replace(/,/g, '') || 0;
            const sub = q * p;
            row.querySelector('.sub-val').innerText = formatNum(sub);
            raw += sub;
        });

        const tax = Math.round(raw * 0.05);
        const grand = raw + tax;

        document.getElementById('res-raw').innerText = '$ ' + formatNum(raw);
        document.getElementById('res-tax').innerText = '$ ' + formatNum(tax);
        document.getElementById('res-grand').innerText = '$ ' + formatNum(grand);

        document.querySelectorAll('#payBody tr').forEach(row => {
            const pct = row.querySelector('.pay-pct').value || 0;
            const amt = Math.round(grand * (pct / 100));
            row.querySelector('.pay-amt').innerText = '$ ' + amt.toLocaleString();
        });
    }

    // --- 儲存機制核心 ---
    
    function saveAllData() {
        const data = { fields: {}, items: [], payments: [] };
        document.querySelectorAll('.save-field').forEach(el => data.fields[el.id] = el.value);
        document.querySelectorAll('#itemBody tr').forEach(row => {
            data.items.push({
                desc: row.querySelector('.item-desc').value,
                qty: row.querySelector('.qty-input').value,
                price: row.querySelector('.price-format').value.replace(/,/g, ''),
                picked: row.querySelector('.pick-box').checked
            });
        });
        document.querySelectorAll('#payBody tr').forEach(row => {
            data.payments.push({
                desc: row.querySelector('.pay-desc').value,
                pct: row.querySelector('.pay-pct').value
            });
        });
        localStorage.setItem('quotationData_v20', JSON.stringify(data));
    }

    function loadAllData() {
        const saved = localStorage.getItem('quotationData_v20');
        if (!saved) return false;
        const data = JSON.parse(saved);
        for (let id in data.fields) {
            const el = document.getElementById(id);
            if (el) el.value = data.fields[id];
        }
        document.getElementById('itemBody').innerHTML = '';
        data.items.forEach(item => addRow(item.desc, item.qty, item.price, item.picked));
        document.getElementById('payBody').innerHTML = '';
        data.payments.forEach(pay => addPayRow(pay.desc, pay.pct));
        return true;
    }

    // ====== 報價單存檔 ======
    const ARCHIVE_KEY = 'quotation_archive_v1';

    function saveQuotation() {
        saveAllData();
        const docNo = document.getElementById('doc_no').value.trim();
        if (!docNo) { alert('請先填入報價單編號'); return; }
        const archive = JSON.parse(localStorage.getItem(ARCHIVE_KEY) || '{}');
        const isOverwrite = !!archive[docNo];
        if (isOverwrite && !confirm(`編號 ${docNo} 已存在，是否覆蓋？`)) return;
        archive[docNo] = {
            data: localStorage.getItem('quotationData_v20'),
            savedAt: new Date().toISOString(),
            custName: document.getElementById('cust_name').value,
            projName: document.getElementById('proj_name').value,
            docDate: document.getElementById('doc_date').value,
            total: document.getElementById('res-grand').innerText
        };
        localStorage.setItem(ARCHIVE_KEY, JSON.stringify(archive));
        alert(`報價單 ${docNo} 已${isOverwrite ? '更新' : '儲存'}`);
    }

    function openArchiveModal() { renderArchiveList(); document.getElementById('archiveModal').classList.add('show'); }

    function renderArchiveList() {
        const archive = JSON.parse(localStorage.getItem(ARCHIVE_KEY) || '{}');
        const entries = Object.entries(archive).sort((a, b) => (b[1].savedAt || '').localeCompare(a[1].savedAt || ''));
        const tbody = document.getElementById('archiveList');
        if (entries.length === 0) {
            tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;color:#94a3b8;padding:20px;">尚無已儲存的報價單</td></tr>';
            return;
        }
        tbody.innerHTML = entries.map(([id, q]) => `
            <tr>
                <td>${id}</td>
                <td>${q.docDate || ''}</td>
                <td>${q.custName || ''}</td>
                <td>${q.projName || ''}</td>
                <td style="text-align:right;">${q.total || ''}</td>
                <td><button class="btn-blue" style="padding:2px 6px;font-size:11px;" onclick="loadArchived('${id.replace(/'/g, "\\'")}')">載入</button></td>
                <td><button class="btn-del" onclick="deleteArchived('${id.replace(/'/g, "\\'")}')">✕</button></td>
            </tr>`).join('');
    }

    function loadArchived(id) {
        const archive = JSON.parse(localStorage.getItem(ARCHIVE_KEY) || '{}');
        const rec = archive[id];
        if (!rec) return;
        localStorage.setItem('quotationData_v20', rec.data);
        location.reload();
    }

    function deleteArchived(id) {
        if (!confirm(`確定刪除報價單 ${id}？`)) return;
        const archive = JSON.parse(localStorage.getItem(ARCHIVE_KEY) || '{}');
        delete archive[id];
        localStorage.setItem(ARCHIVE_KEY, JSON.stringify(archive));
        renderArchiveList();
    }

    // ====== 客戶 / 聯絡人名單 ======
    const CUST_KEY = 'quotation_customers_v1';
    const CONTACT_KEY = 'quotation_contacts_v1';

    function getList(key) { return JSON.parse(localStorage.getItem(key) || '[]'); }
    function setList(key, arr) { localStorage.setItem(key, JSON.stringify(arr)); refreshDatalists(); }

    function refreshDatalists() {
        const cl = document.getElementById('custNameList');
        const tl = document.getElementById('contactNameList');
        if (cl) cl.innerHTML = getList(CUST_KEY).map(c => `<option value="${c.name}">`).join('');
        if (tl) tl.innerHTML = getList(CONTACT_KEY).map(c => `<option value="${c.name}">`).join('');
    }

    function onCustomerPick() {
        const name = document.getElementById('cust_name').value.trim();
        const found = getList(CUST_KEY).find(c => c.name === name);
        if (found) {
            document.getElementById('cust_tax').value = found.tax || '';
            document.getElementById('cust_contact').value = found.contact || '';
            saveAllData();
        }
    }
    function onMyContactPick() {
        const name = document.getElementById('my_co_boss').value.trim();
        const found = getList(CONTACT_KEY).find(c => c.name === name);
        if (found) {
            document.getElementById('my_co_email').value = found.email || '';
            saveAllData();
        }
    }

    function openCustomerModal() { renderCustList(); document.getElementById('custModal').classList.add('show'); }
    function openContactModal() { renderContactList(); document.getElementById('contactModal').classList.add('show'); }
    function closeModal(id) { document.getElementById(id).classList.remove('show'); refreshDatalists(); }

    function renderCustList() {
        const list = getList(CUST_KEY);
        document.getElementById('custList').innerHTML = list.map((c, i) => `
            <tr>
                <td><input value="${c.name||''}" onchange="updateCust(${i},'name',this.value)"></td>
                <td><input value="${c.tax||''}" onchange="updateCust(${i},'tax',this.value)"></td>
                <td><input value="${c.contact||''}" onchange="updateCust(${i},'contact',this.value)"></td>
                <td><button class="btn-blue" style="padding:2px 6px;font-size:11px;" onclick="applyCust(${i})">套用</button></td>
                <td><button class="btn-del" onclick="delCust(${i})">✕</button></td>
            </tr>`).join('');
    }
    function applyCust(i) {
        const c = getList(CUST_KEY)[i];
        if (!c) return;
        document.getElementById('cust_name').value = c.name || '';
        document.getElementById('cust_tax').value = c.tax || '';
        document.getElementById('cust_contact').value = c.contact || '';
        saveAllData();
        closeModal('custModal');
    }
    function addCustomer() {
        const arr = getList(CUST_KEY);
        const cur = document.getElementById('cust_name').value.trim();
        arr.push({ name: cur, tax: document.getElementById('cust_tax').value, contact: document.getElementById('cust_contact').value });
        setList(CUST_KEY, arr);
        renderCustList();
    }
    function updateCust(i, k, v) { const a = getList(CUST_KEY); a[i][k] = v; setList(CUST_KEY, a); }
    function delCust(i) { const a = getList(CUST_KEY); a.splice(i,1); setList(CUST_KEY, a); renderCustList(); }

    function renderContactList() {
        const list = getList(CONTACT_KEY);
        document.getElementById('contactList').innerHTML = list.map((c, i) => `
            <tr>
                <td><input value="${c.name||''}" onchange="updateContact(${i},'name',this.value)"></td>
                <td><input value="${c.email||''}" onchange="updateContact(${i},'email',this.value)"></td>
                <td><button class="btn-blue" style="padding:2px 6px;font-size:11px;" onclick="applyContact(${i})">套用</button></td>
                <td><button class="btn-del" onclick="delContact(${i})">✕</button></td>
            </tr>`).join('');
    }
    function applyContact(i) {
        const c = getList(CONTACT_KEY)[i];
        if (!c) return;
        document.getElementById('my_co_boss').value = c.name || '';
        document.getElementById('my_co_email').value = c.email || '';
        saveAllData();
        closeModal('contactModal');
    }
    function addContact() {
        const arr = getList(CONTACT_KEY);
        arr.push({ name: document.getElementById('my_co_boss').value, email: document.getElementById('my_co_email').value });
        setList(CONTACT_KEY, arr);
        renderContactList();
    }
    function updateContact(i, k, v) { const a = getList(CONTACT_KEY); a[i][k] = v; setList(CONTACT_KEY, a); }
    function delContact(i) { const a = getList(CONTACT_KEY); a.splice(i,1); setList(CONTACT_KEY, a); renderContactList(); }

    // ====== 方案模式 ======
    function toggleProposal() {
        document.body.classList.toggle('proposal-mode');
        const on = document.body.classList.contains('proposal-mode');
        document.getElementById('propBtn').innerText = '📋 方案模式：' + (on ? '開' : '關');
        localStorage.setItem('proposalMode', on ? '1' : '0');
    }
    if (localStorage.getItem('proposalMode') === '1') {
        document.body.classList.add('proposal-mode');
        window.addEventListener('DOMContentLoaded', () => {
            const b = document.getElementById('propBtn'); if (b) b.innerText = '📋 方案模式：開';
        });
    }

    function toggleBank() {
        document.body.classList.toggle('hide-bank');
        const hidden = document.body.classList.contains('hide-bank');
        document.getElementById('bankBtn').innerText = '🏦 付款資訊：' + (hidden ? '隱藏' : '顯示');
        localStorage.setItem('hideBank', hidden ? '1' : '0');
    }
    if (localStorage.getItem('hideBank') === '1') {
        document.body.classList.add('hide-bank');
        window.addEventListener('DOMContentLoaded', () => {
            const b = document.getElementById('bankBtn'); if (b) b.innerText = '🏦 付款資訊：隱藏';
        });
    }

    function toggleStamp() {
        document.body.classList.toggle('hide-stamp');
        const hidden = document.body.classList.contains('hide-stamp');
        document.getElementById('stampBtn').innerText = '🔖 公司印章：' + (hidden ? '隱藏' : '顯示');
        localStorage.setItem('hideStamp', hidden ? '1' : '0');
    }
    if (localStorage.getItem('hideStamp') === '1') {
        document.body.classList.add('hide-stamp');
        window.addEventListener('DOMContentLoaded', () => {
            const b = document.getElementById('stampBtn'); if (b) b.innerText = '🔖 公司印章：隱藏';
        });
    }
    refreshDatalists();

    function clearData() {
        if (confirm("確定要清空所有內容（包含已儲存的公司基本資訊與銀行帳號）並重新開始嗎？")) {
            localStorage.removeItem('quotationData_v20');
            location.reload();
        }
    }
</script>

</body>
</html>
