<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>商務報價系統</title>
    <style>
        :root { --slate-900: #0f172a; --slate-700: #334155; --slate-500: #64748b; --slate-200: #e2e8f0; --blue-600: #2563eb; }
        * { box-sizing: border-box; font-family: "Inter", "PingFang TC", "Microsoft JhengHei", sans-serif; }
        body { background: #475569; padding: 20px; display: flex; justify-content: center; color: var(--slate-900); }

        .a4-page { 
            background: white; width: 210mm; min-height: 297mm; padding: 30px 60px; 
            box-shadow: 0 40px 100px -20px rgba(0,0,0,0.5); position: relative; display: flex; flex-direction: column;
        }

        /* Logo 與 Header */
        .header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 25px; }
        .brand-container { display: flex; gap: 15px; align-items: flex-start; }
        
        .logo-box {
            width: 70px; height: 70px; border: 1px dashed var(--slate-200);
            display: flex; align-items: center; justify-content: center;
            position: relative; overflow: hidden; background: #f8fafc;
        }
        .logo-box img { max-width: 100%; max-height: 100%; object-fit: contain; }
        .logo-placeholder { font-size: 9px; color: var(--slate-500); text-align: center; cursor: pointer; }
        #logo-file { position: absolute; width: 100%; height: 100%; opacity: 0; cursor: pointer; }

        .brand-zone { border-left: 3.5px solid var(--blue-600); padding-left: 12px; }
        .company-name { font-size: 18px; font-weight: 800; border: none; outline: none; width: 300px; background: transparent; }
        .company-sub { font-size: 14px; color: var(--slate-500); margin-top: 5px; line-height: 1.6; }
        
        /* 自由標籤與字體統一 */
        .label-editable { border: none; outline: none; background: transparent; font-weight: 700; color: var(--slate-500); width: 80px; font-size: 14px; }
        .value-editable { border: none; outline: none; background: transparent; color: var(--slate-500); width: 200px; font-size: 14px; }

        .doc-meta { text-align: right; }
        .doc-label { font-size: 9px; font-weight: 800; color: var(--blue-600); letter-spacing: 2px; }
        .doc-no-input { border: none; outline: none; text-align: right; font-size: 18px; font-weight: 300; width: 200px; background: transparent; }

        .project-wrap { margin-bottom: 25px; }
        .tag { font-size: 14px; font-weight: 800; color: var(--slate-500); text-transform: uppercase; margin-bottom: 4px; display: block; }
        .project-input { border: none; font-size: 16px; font-weight: 700; width: 100%; outline: none; border-bottom: 1.5px solid var(--slate-200); padding-bottom: 4px; }

        .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 50px; margin-bottom: 25px; }
        .info-row { display: grid; grid-template-columns: 85px 1fr; border-bottom: 1px solid #f1f5f9; padding: 5px 0; align-items: center; }
        .info-label-custom { border: none; outline: none; font-size: 14px; font-weight: 700; color: var(--slate-500); background: transparent; width: 100%; }
        .info-input { border: none; outline: none; font-size: 14px; text-align: left; font-weight: 600; background: transparent; width: 100%; }

        /* 表格樣式 */
        .table-main { width: 100%; border-collapse: collapse; margin-bottom: 10px; }
        .table-main th { text-align: left; padding: 10px; font-size: 13px; color: var(--slate-500); border-bottom: 2px solid var(--slate-900); }
        .table-main td { padding: 8px 10px; border-bottom: 1px solid var(--slate-200); vertical-align: top; font-size: 14px; }

        .col-id { width: 35px; color: var(--slate-500); font-weight: 800; padding-top: 12px !important; }
        .col-qty { width: 70px; text-align: center; } 
        .col-price { width: 110px; text-align: right; }
        .col-sum { width: 120px; text-align: right; font-weight: 600; }

        .field-input { border: none; outline: none; text-align: inherit; font-size: 14px; background: transparent; width: 100%; font-weight: inherit; }
        .auto-expand { width: 100%; border: none; outline: none; resize: none; font-size: 14px; line-height: 1.6; background: transparent; overflow: hidden; }

        /* TOTAL 對齊 */
        .footer-layout { display: flex; flex-direction: column; gap: 15px; }
        .summary-box { align-self: flex-end; width: 140px; text-align: right; padding-right: 10px; }
        .sum-row.grand { border-top: 2px solid var(--slate-900); padding-top: 10px; display: flex; flex-direction: column; align-items: flex-end; }
        .grand-label { font-size: 11px; font-weight: 800; color: var(--slate-500); margin-bottom: 2px; }
        .grand-price { font-size: 18px; font-weight: 900; color: var(--slate-900); }

        /* 卡片與大文字框 */
        .card { background: #fdfdfd; border-radius: 6px; padding: 15px; border: 1px solid var(--slate-200); }
        .card-title { font-size: 13px; font-weight: 800; color: var(--slate-900); margin-bottom: 10px; display: flex; align-items: center; gap: 6px; }
        .card-title::before { content: ""; width: 3px; height: 10px; background: var(--blue-600); }
        
        /* 移除底線後的付款金額輸入 */
        .pay-amt-input { width: 130px; text-align: right; color: var(--slate-900); font-weight: 700; border: none; font-size: 14px; }

        .signature-zone { margin-top: 20px; align-self: flex-end; text-align: center; }
        .signature-line { width: 180px; border-bottom: 1.5px solid var(--slate-900); margin-bottom: 5px; height: 35px; }

        .toolbar { position: fixed; left: 20px; top: 20px; display: flex; flex-direction: column; gap: 8px; z-index: 100; }
        button { border: none; border-radius: 4px; padding: 8px 14px; font-weight: 700; cursor: pointer; color: white; font-size: 11px; }
        .btn-dark { background: var(--slate-900); }
        .btn-blue { background: var(--blue-600); }
        .btn-del { background: #fee2e2; color: #ef4444; padding: 2px 5px; font-size: 12px; }
        .btn-warn { background: #f59e0b; margin-top: 10px; }

        @media print {
            .toolbar, .btn-del, .logo-placeholder { display: none !important; }
            .logo-box { border: none; background: transparent; }
            body { background: white; padding: 0; }
            .a4-page { box-shadow: none; width: 100%; margin: 0; padding: 10mm 15mm; }
        }
    </style>
</head>
<body oninput="saveAllData()">

<div class="toolbar">
    <button class="btn-dark" onclick="addRow()">＋ 新增報價項目</button>
    <button class="btn-dark" style="background: #475569;" onclick="addPayRow()">＋ 新增付款期數</button>
    <button class="btn-blue" onclick="window.print()">🖨️ 列印 / 存為 PDF</button>
    <button class="btn-warn" onclick="clearData()">🧹 清空重填</button>
</div>

<div class="a4-page">
    <div class="header">
        <div class="brand-container">
            <div class="logo-box">
                <img id="logo-preview" src="" style="display:none;">
                <div class="logo-placeholder" id="logo-text">點擊上傳<br>Logo</div>
                <input type="file" id="logo-file" accept="image/*" onchange="handleLogo(this)">
            </div>
            <div class="brand-zone">
                <input type="text" class="company-name save-field" id="my_co_name" value="您的公司名稱">
                <div class="company-sub">
                    <div><input type="text" class="save-field label-editable" id="L1" value="統一編號："><input type="text" class="save-field value-editable" id="V1" value="88888888"></div>
                    <div><input type="text" class="save-field label-editable" id="L2" value="聯絡人員："><input type="text" class="save-field value-editable" id="V2" value="請輸入姓名"></div>
                    <div><input type="text" class="save-field label-editable" id="L3" value="聯絡電話："><input type="text" class="save-field value-editable" id="V3" value="0900-000-000"></div>
                </div>
            </div>
        </div>
        <div class="doc-meta">
            <div class="doc-label">QUOTATION</div>
            <input type="text" class="doc-no-input save-field" id="doc_no" placeholder="單號生成中...">
        </div>
    </div>

    <div class="project-wrap">
        <span class="tag">專案名稱 / Project Name</span>
        <input type="text" class="project-input save-field" id="proj_name" placeholder="請輸入專案名稱">
    </div>

    <div class="info-grid">
        <div class="info-col">
            <div class="info-row">
                <input type="text" id="cust_L1" class="info-label-custom save-field" value="客戶抬頭">
                <input type="text" id="cust_V1" class="info-input save-field" placeholder="請輸入...">
            </div>
            <div class="info-row">
                <input type="text" id="cust_L2" class="info-label-custom save-field" value="統一編號">
                <input type="text" id="cust_V2" class="info-input save-field">
            </div>
            <div class="info-row">
                <input type="text" id="cust_L3" class="info-label-custom save-field" value="聯絡人員">
                <input type="text" id="cust_V3" class="info-input save-field">
            </div>
        </div>
        <div class="info-col">
            <div class="info-row"><span class="info-label-custom" style="font-weight:700">報價日期</span><input type="date" id="doc_date" class="info-input save-field"></div>
            <div class="info-row"><span class="info-label-custom" style="font-weight:700">有效期限</span><input type="text" id="doc_valid" class="info-input save-field" value="30 天"></div>
            <div class="info-row">
                <input type="text" id="cust_L4" class="info-label-custom save-field" value="聯絡電話">
                <input type="text" id="cust_V4" class="info-input save-field">
            </div>
        </div>
    </div>

    <table class="table-main">
        <thead>
            <tr>
                <th class="col-id">#</th>
                <th class="col-desc">項目描述</th>
                <th class="col-qty">數量</th>
                <th class="col-price">單價 (未稅)</th>
                <th class="col-sum">小計</th>
                <th style="width: 20px;" class="toolbar"></th>
            </tr>
        </thead>
        <tbody id="itemBody"></tbody>
    </table>

    <div class="footer-layout">
        <div class="summary-box">
            <div class="sum-row grand">
                <span class="grand-label">TOTAL</span>
                <span class="grand-price" id="res-grand">$ 0</span>
            </div>
        </div>

        <div class="card">
            <div class="card-title">付款條件與期數拆分</div>
            <table style="width: 100%; border-collapse: collapse;">
                <tbody id="payBody"></tbody>
            </table>
        </div>

        <div class="card">
            <div class="card-title">備註事項與細則</div>
            <textarea id="memo" class="auto-expand save-field" oninput="resize(this)" placeholder="輸入備註內容...">1. 確認無誤後請蓋 (簽)章回傳。
2. 匯款後因買⽅之事由導致終⽌，本公司得不退款。</textarea>
        </div>

        <div class="card">
            <div class="card-title">付款資訊 / 匯款帳號</div>
            <textarea id="bankInfo" class="auto-expand save-field" oninput="resize(this)" placeholder="輸入銀行名稱、分行、戶名、帳號...">銀行：(004)臺灣銀行
戶名：您的公司名稱
帳號：5757-8888-88</textarea>
        </div>

        <div class="signature-zone">
            <div class="signature-line"></div>
            <div class="signature-label" style="font-size: 12px; font-weight: 700; color: var(--slate-500);">客戶簽章 / Authorized Signature</div>
        </div>
    </div>
</div>

<script>
    window.onload = function() {
        if (!loadAllData()) {
            addRow();
            addPayRow("第一期：訂金", "0");
            document.getElementById('doc_date').valueAsDate = new Date();
            generateDocNo(); 
        }
        // 初始化所有 textarea 高度
        setTimeout(() => {
            document.querySelectorAll('textarea').forEach(el => resize(el));
        }, 100);
        calc();
    }

    function generateDocNo() {
        const now = new Date();
        const yyyy = now.getFullYear();
        const mm = String(now.getMonth() + 1).padStart(2, '0');
        const dd = String(now.getDate()).padStart(2, '0');
        document.getElementById('doc_no').value = `QTN-${yyyy}${mm}${dd}-01`;
    }

    function handleLogo(input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = function(e) {
                const preview = document.getElementById('logo-preview');
                preview.src = e.target.result;
                preview.style.display = 'block';
                document.getElementById('logo-text').style.display = 'none';
                saveAllData();
            }
            reader.readAsDataURL(input.files[0]);
        }
    }

    function formatNum(n) { return Number(n).toLocaleString('en-US'); }
    function toMoney(el) { 
        let val = el.value.replace(/,/g, ''); 
        if(!isNaN(val) && val !== "") el.value = formatNum(val); 
        saveAllData();
    }
    function toNum(el) { el.value = el.value.replace(/,/g, ''); }
    function resize(el) { el.style.height = 'auto'; el.style.height = el.scrollHeight + 'px'; }

    function addRow(desc = "", qty = 1, price = 0) {
        const tbody = document.getElementById('itemBody');
        const num = (tbody.rows.length + 1).toString().padStart(2, '0');
        const row = `<tr>
            <td class="col-id">${num}</td>
            <td class="col-desc"><textarea class="auto-expand item-desc" rows="1" oninput="resize(this);saveAllData()">${desc}</textarea></td>
            <td class="col-qty"><input type="number" class="field-input qty-input" value="${qty}" oninput="calc();saveAllData()"></td>
            <td class="col-price"><input type="text" class="field-input" value="${formatNum(price)}" onfocus="toNum(this)" onblur="toMoney(this)" oninput="calc()"></td>
            <td class="col-sum sub-val">${formatNum(qty * price)}</td>
            <td class="toolbar"><button class="btn-del" onclick="this.closest('tr').remove();calc();saveAllData();">✕</button></td>
        </tr>`;
        tbody.insertAdjacentHTML('beforeend', row);
        resize(tbody.lastElementChild.querySelector('textarea'));
    }

    function addPayRow(desc = "", amt = "0") {
        const row = `<tr>
            <td><input type="text" class="field-input pay-desc" value="${desc}" oninput="saveAllData()"></td>
            <td style="text-align: right;">
                <span style="font-size: 12px; color: var(--slate-500);">$</span>
                <input type="text" class="pay-amt-input" value="${amt}" onfocus="toNum(this)" onblur="toMoney(this)" oninput="saveAllData()">
            </td>
            <td class="toolbar" style="text-align: right; width: 30px;"><button class="btn-del" onclick="this.closest('tr').remove();saveAllData();">✕</button></td>
        </tr>`;
        document.getElementById('payBody').insertAdjacentHTML('beforeend', row);
    }

    function calc() {
        let total = 0;
        document.querySelectorAll('#itemBody tr').forEach((row, i) => {
            row.cells[0].innerText = (i + 1).toString().padStart(2, '0');
            const q = row.querySelector('.qty-input').value || 0;
            const p = row.querySelector('input[onblur="toMoney(this)"]').value.replace(/,/g, '') || 0;
            const sub = q * p;
            row.querySelector('.sub-val').innerText = formatNum(sub);
            total += sub;
        });
        document.getElementById('res-grand').innerText = '$ ' + formatNum(total);
    }

    function saveAllData() {
        const data = { fields: {}, items: [], payments: [], logo: "" };
        document.querySelectorAll('.save-field').forEach(el => data.fields[el.id] = el.value);
        document.querySelectorAll('#itemBody tr').forEach(row => {
            data.items.push({ desc: row.querySelector('.item-desc').value, qty: row.querySelector('.qty-input').value, price: row.querySelector('input[onblur="toMoney(this)"]').value.replace(/,/g, '') });
        });
        document.querySelectorAll('#payBody tr').forEach(row => {
            data.payments.push({ desc: row.querySelector('.pay-desc').value, amt: row.querySelector('.pay-amt-input').value });
        });
        data.logo = document.getElementById('logo-preview').src;
        localStorage.setItem('quotationData_vFinal', JSON.stringify(data));
    }

    function loadAllData() {
        const saved = localStorage.getItem('quotationData_vFinal');
        if (!saved) return false;
        const data = JSON.parse(saved);
        for (let id in data.fields) { const el = document.getElementById(id); if (el) el.value = data.fields[id]; }
        if (data.logo && data.logo.startsWith('data:image')) {
            const preview = document.getElementById('logo-preview');
            preview.src = data.logo;
            preview.style.display = 'block';
            document.getElementById('logo-text').style.display = 'none';
        }
        document.getElementById('itemBody').innerHTML = '';
        data.items.forEach(item => addRow(item.desc, item.qty, item.price));
        document.getElementById('payBody').innerHTML = '';
        data.payments.forEach(pay => addPayRow(pay.desc, pay.amt));
        return true;
    }

    function clearData() {
        if (confirm("確定要清空所有內容並重新開始嗎？")) {
            localStorage.removeItem('quotationData_vFinal');
            location.reload();
        }
    }
</script>

</body>
</html>
